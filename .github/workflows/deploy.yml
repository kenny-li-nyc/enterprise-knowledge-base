name: Deploy MkDocs to GitHub Pages

on:
  push:
    branches:
      - main  # Change to 'master' if your default branch uses the old naming

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs
          # If you use the Material theme, uncomment the line below:
          # pip install mkdocs-material 

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

