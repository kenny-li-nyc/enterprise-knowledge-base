site_name: "INFRA // REFERENCE"
site_description: "Personal architecture reference and interview prep — Identity, Endpoint, Security, Network, Virtualization/Compute, Storage/Data, Cloud/Hybrid"
repo_url: https://github.com/kenny-li-nyc/enterprise-knowledge-base
repo_name: kenny-li-nyc/enterprise-knowledge-base
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.instant
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Identity:
      - Overview: identity/index.md
      - "Directory & Trust Foundation":
          - Overview: identity/layer1-directory-trust/index.md

          # Structure — how the directory is built and stays alive
          - "Forests, Domains, OUs & Sites": identity/layer1-directory-trust/forests-domains-ous-sites.md
          - "Replication Architecture": identity/layer1-directory-trust/replication-architecture.md
          - "FSMO Roles": identity/layer1-directory-trust/fsmo-roles.md
          - "Forest Recovery": identity/layer1-directory-trust/forest-recovery.md

          # Use — how identity is consumed
          - "Authentication": identity/layer1-directory-trust/authentication.md
          - "Authorization": identity/layer1-directory-trust/authorization.md

          # Trust — how identity crosses boundaries
          - "Trust Architecture": identity/layer1-directory-trust/trust-architecture.md
          - "Federation": identity/layer1-directory-trust/federation.md

          # Services — supporting infrastructure
          - "Forest Services": identity/layer1-directory-trust/forest-services.md
  - Endpoint:
      - Overview: endpoint/index.md

      # Lifecycle & Identity
      - "Device Lifecycle & Provisioning": endpoint/device-lifecycle-provisioning.md
      - "Endpoint Identity & Trust": endpoint/endpoint-identity-trust.md

      # Configuration & Maintenance
      - "Configuration Management & Policy Enforcement": endpoint/configuration-management-policy-enforcement.md
      - "Patch & Update Management": endpoint/patch-update-management.md
      - "Endpoint Hardening & Baseline Configuration": endpoint/endpoint-hardening-baseline-configuration.md

      # Application & Access
      - "Application Management & Delivery": endpoint/application-management-delivery.md
      - "Remote Access & Connectivity": endpoint/remote-access-connectivity.md

      # Resilience
      - "Endpoint Recovery & Resilience": endpoint/endpoint-recovery-resilience.md